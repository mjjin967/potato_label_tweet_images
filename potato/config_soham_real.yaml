"annotation_task_name": "Image Labeling"

"data_files":
  - "data/images_real.jsonl"

"media_directory": "data/media_real"

"item_properties":
  "id_key": "id"
  "text_key": "text"
  "use_html": true

"instance_display":
  "fields":
    - "type": "image"
      "key": "url"

"output_annotation_dir": "annotation_output/image-labeling"
"output_file_format": "jsonl"

"html_layout": "templates/image_layout.html"

"annotation_schemes":
  - "annotation_type": "radio"
    "name": "visual style"
    "description": "What does the image look like aesthetically?"
    "labels":
      - "photographic"
      - "illustrated/drawn"
      - "composite/mixed"
      - "text-dominant"
    "sequential_key_binding": True

  - "annotation_type": "radio"
    "name": "origin"
    "description": "What is the likely origin of the media?"
    "labels":
      - "appears human-made"
      - "appears AI-generated"
      - "ambiguous/unclear"

  - "annotation_type": "multiselect"
    "name": "format/function"
    "description": "How is the image being used or presented?"
    "labels":
      - "personal/casual"
      - "journalistic/documentary"
      - "promotional/commercial"
      - "meme/reaction"
      - "artwork/creative"
      - "informational graphic"
      - "other"

  - "annotation_type": "multiselect"
    "name": "content"
    "description": "What topic is depicted?"
    "labels":
      - "politics/current events"
      - "sports"
      - "religion/spirituality"
      - "entertainment"
      - "games/anime"
      - "science/technology"
      - "social/lifestyle"
      - "nsfw"
      - "other/none of the above"

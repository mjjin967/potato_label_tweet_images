"annotation_task_name": "Image Labeling"

"data_files":
  - "data/images_jean.jsonl"

"media_directory": "data/media_jean"

"item_properties":
  "id_key": "id"
  "text_key": "text"
  "use_html": true

"instance_display":
  "fields":
    - "type": "image"
      "key": "url"

"output_annotation_dir": "annotation_output/image-labeling"
"output_file_format": "jsonl"

"html_layout": "templates/image_layout.html"

"annotation_schemes":
  - "annotation_type": "radio"
    "name": "origin"
    "description": "Is this image AI-generated or real?"
    "labels":
      - "ai-generated"
      - "real"
      - "unknown"
    "sequential_key_binding": True

  - "annotation_type": "multiselect"
    "name": "categories"
    "description": "Select all applicable categories"
    "labels":
      # Photographic
      - "photo_regular"          # Real-world subjects, no explicit content
      - "photo_explicit"         # NSFW photorealistic content
      - "photo_composite"        # Photo manipulations / blended images

      # Illustrated / Artistic
      - "illustration_digital"   # General digital art, concept art
      - "illustration_traditional" # Art mimicking paint, watercolor, pencil, etc.
      - "cartoon_regular"        # Stylized characters/scenes, SFW
      - "cartoon_explicit"       # Stylized characters/scenes, NSFW
      - "anime_regular"          # Anime/manga style, SFW
      - "anime_explicit"         # Anime/manga style, NSFW

      # Text-Forward
      - "poster"                 # Promotional or decorative, text + visuals
      - "infographic"            # Data, diagrams, explainer visuals
      - "meme_photo"             # Photo-based meme format
      - "meme_illustration"      # Drawn/illustrated meme format
      - "screenshot_fake"        # Fabricated UI, fake tweets, chat logs, etc.

      # Hybrid / Ambiguous
      - "avatar_profile"         # Headshots or portraits used as profile pics
      - "logo_branding"          # Brand marks, icons, product visuals
      - "video_thumbnail"        # Clickbait-style preview stills
      # add more as you discover them
    "has_free_response": True  # lets you type in new categories on the fly